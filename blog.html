<section id="blog" style="padding: 40px 20px; max-width: 900px; margin: 0 auto;">
    <h2 style="font-size: 1.6rem; margin-bottom: 6px;">📝 Blog</h2>
    <p style="color: #666; margin-bottom: 28px; font-size: 0.95rem;">Notes on geomorphology, modeling, and research.</p>

    <div id="blog-posts-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;">
        <p>Loading posts...</p>
    </div>
</section>

<!-- Blog Post Modal -->
<div id="blogModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; overflow-y:auto;">
    <div style="background:#fff; max-width:760px; margin:60px auto; border-radius:12px; padding:40px; position:relative;">
        <span id="closeBlogModal" style="position:absolute; top:16px; right:20px; font-size:1.5rem; cursor:pointer;">&times;</span>
        <div id="blog-post-content"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    async function loadBlogPosts() {
        const container = document.getElementById("blog-posts-container");
        try {
            const res = await fetch("posts/posts.json");
            const posts = await res.json();

            container.innerHTML = "";

            posts.reverse().forEach(post => {
                const card = document.createElement("div");
                card.style.cssText = `
                    border: 1px solid #e0e0e0;
                    border-radius: 12px;
                    padding: 24px;
                    cursor: pointer;
                    transition: box-shadow 0.2s;
                `;
                card.innerHTML = `
                    <p style="font-size:0.8rem; color:#999; margin:0 0 6px;">${post.date}</p>
                    <h3 style="margin: 0 0 8px; font-size: 1.3rem;">${post.title}</h3>
                    <p style="color:#555; margin:0 0 14px;">${post.summary}</p>
                    <span style="font-size:0.9rem; font-weight:600; color: var(--accent, #2a7ae2);">Read more →</span>
                `;
                card.addEventListener("mouseenter", () => card.style.boxShadow = "0 4px 20px rgba(0,0,0,0.1)");
                card.addEventListener("mouseleave", () => card.style.boxShadow = "none");
                card.addEventListener("click", () => openPost(post.file, post.title, post.date));
                container.appendChild(card);
            });

        } catch (err) {
            container.innerHTML = "<p>Failed to load posts.</p>";
            console.error(err);
        }
    }

    async function openPost(file, title, date) {
        const modal = document.getElementById("blogModal");
        const content = document.getElementById("blog-post-content");

        content.innerHTML = `<p>Loading...</p>`;
        modal.style.display = "block";

        try {
            const res = await fetch(file);
            const md = await res.text();
            content.innerHTML = `
                <p style="font-size:0.8rem; color:#999; margin-bottom:6px;">${date}</p>
                <h2 style="margin-bottom:24px;">${title}</h2>
                <div style="line-height:1.8; color:#333;">${marked.parse(md)}</div>
            `;
        } catch (err) {
            content.innerHTML = "<p>Failed to load post.</p>";
        }
    }

    document.getElementById("closeBlogModal").addEventListener("click", () => {
        document.getElementById("blogModal").style.display = "none";
    });

    window.addEventListener("click", (e) => {
        const modal = document.getElementById("blogModal");
        if (e.target === modal) modal.style.display = "none";
    });

    loadBlogPosts();
</script>
