<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedro Oliveira (@thepedroland) | Landscape Evolution</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header id="nav-placeholder" class="navbar"></header>

    <div id="main-content">
        <img src="images/header.png" alt="Amazon River" class="header-image">

        <section class="hero" id="home">
            <div>
                <h1>Geoscientist & Modeler building quantitative stories of landscapes</h1>
                <p>I work with numerical models applied to geomorphology and cosmogenic nuclide analysis.</p>
            </div>
            <div class="hero-image">
                <img src="images/hero_pic.jpg" alt="Hero" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;">
            </div>
        </section>

        <div id="blog-section"></div>
    </div>

    <div id="modal-placeholder"></div>

    <footer style="color: black; padding: 20px; text-align: center;">
        © 2026 Pedro Oliveira
    </footer>

    <script>
        // COMPONENT LOADER
        async function loadComponent(id, url) {
            try {
                const response = await fetch(url);
                const data = await response.text();
                document.getElementById(id).innerHTML = data;
            } catch (e) { console.error("Load error", e); }
        }

        // GRID VIEW: Shows your list of posts
        async function loadBlogPosts() {
            // Ensure hero is visible when looking at the list
            document.getElementById('home').style.display = 'grid';
            const container = document.getElementById('blog-posts-container');
            if (!container) return;

            try {
                const response = await fetch('/posts/posts.json');
                const posts = await response.json();
                container.innerHTML = posts.map(post => `
                    <div class="blog-post-card">
                        <small>${post.date}</small>
                        <h3>${post.title}</h3>
                        <p>${post.summary}</p>
                        <button class="btn" onclick="viewPost('${post.filename}')">Read Full Story</button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = "<p>Posts coming soon!</p>";
            }
        }

        // FULL POST VIEW: Hides the hero to focus on the text
        async function viewPost(filename) {
            const blogSection = document.getElementById('blog-section');
            const hero = document.getElementById('home');

            // Hide hero for better reading experience
            hero.style.display = 'none';
            window.scrollTo(0,0);

            try {
                const response = await fetch(`/posts/${filename}`);
                const mdText = await response.text();
                const htmlContent = marked.parse(mdText);

                // We overwrite the blog-section, but NOT the whole body
                blogSection.innerHTML = `
                    <div class="markdown-body" style="max-width: 800px; margin: 2rem auto;">
                        <button class="btn" onclick="resetBlog()">← Back to Homepage</button>
                        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #eee;">
                        ${htmlContent}
                    </div>
                `;
            } catch (err) {
                blogSection.innerHTML = "<p>Error loading markdown file.</p>";
            }
        }

        // Helper to go back
        async function resetBlog() {
            await loadComponent('blog-section', '/blog.html');
            loadBlogPosts();
        }

        // INITIALIZE
        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('nav-placeholder', '/navbar.html');
            await loadComponent('blog-section', '/blog.html');
            await loadComponent('modal-placeholder', '/contact-modal.html');
            loadBlogPosts();
        });

        // MODAL/NAV LOGIC
        document.addEventListener("click", function (e) {
            const modal = document.getElementById("contactModal");
            if (e.target.closest("#navContact")) {
                e.preventDefault();
                if(modal) modal.style.display = "flex";
            }
            if (e.target.classList.contains("close-btn") || e.target === modal) {
                if(modal) modal.style.display = "none";
            }
            if (e.target.closest(".menu-toggle")) {
                document.querySelector(".nav-links").classList.toggle("active");
            }
        });
    </script>
</body>
</html>
