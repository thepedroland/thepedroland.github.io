<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedro Oliveira (@thepedroland) | Landscape Evolution </title>
</head>

<body>
    <header id="nav-placeholder" class="navbar"></header>

    <img src="images/header.png" alt="Amazon River" class="header-image">

    <section class="hero" id="home">
        <div>
            <h1>Geoscientist & Modeler building quantitative stories of landscapes</h1>
            <p>I work with numerical models applied to geomorphology and cosmogenic nuclide analysis to understand Earth surface processes.</p>
        </div>
        <div class="hero-image">
            <img src="images/hero_pic.jpg" alt="Hero" style="width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius);">
        </div>
    </section>

    <div id="blog-section"></div>

    <footer style="color: black; padding: 20px; text-align: center;">
        © 2026 Pedro Oliveira · pedrosilvestre442@gmail.com
    </footer>

    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">
                <h3><i class="fas fa-envelope-open-text"></i> How can I help? </h3>
            </div>
            <form action="https://formspree.io/f/xwvvrvrd" method="POST" enctype="multipart/form-data" class="modal-form">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="How can I help with your landscape evolution project?" rows="4" required></textarea>
                <button type="submit" class="submit-btn">
                    Send Message <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Inside your index.html <script>
    window.addEventListener('DOMContentLoaded', async () => {
    await loadComponent('nav-placeholder', 'navbar.html');

    // 1. Load the blog HTML structure
    await loadComponent('blog-section', 'blog.html');

    // 2. NOW manually call the function that lives inside blog.html (or blog.js)
    if (typeof loadBlogPosts === "function") {
        loadBlogPosts();
    } else {
        // If the script didn't execute, you might need to move
        // loadBlogPosts into its own .js file and link it in index.html
        console.log("Blog script not detected, consider moving it to a standalone .js file.");
    }
});
        // 1. Improved load function that returns a Promise
        async function loadComponent(id, url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.text();
                document.getElementById(id).innerHTML = data;
            } catch (err) {
                console.error("Failed to load section:", url, err);
            }
        }

        const modal = document.getElementById("contactModal");
        const closeBtn = document.querySelector(".close-btn");

        // 2. Main execution block using async/await
        window.addEventListener('DOMContentLoaded', async () => {

            // Load components sequentially to ensure elements exist before attaching listeners
            await loadComponent('nav-placeholder', 'navbar.html');
            await loadComponent('blog-section', 'blog.html');

            // Now attach listeners to elements that were just loaded inside navbar.html
            const navContact = document.getElementById("navContact");
            if (navContact) {
                navContact.addEventListener("click", function (e) {
                    e.preventDefault();
                    modal.style.display = "flex";
                });
            }
        });

        // 3. Global click delegation for mobile menu (since navbar is dynamic)
        document.addEventListener("click", function (e) {
            const menuToggle = e.target.closest(".menu-toggle");
            const navLinks = document.querySelector(".nav-links");

            if (menuToggle && navLinks) {
                navLinks.classList.toggle("active");
            }
            if (e.target.closest(".nav-links a")) {
                navLinks.classList.remove("active");
            }
        });

        // 4. Modal closing logic
        closeBtn.onclick = () => modal.style.display = "none";

        window.addEventListener("click", (event) => {
            if (event.target === modal) {
                modal.style.display = "none";
            }
            // Check for blog-specific modals if they exist in blog.html
            const blogModal = document.getElementById("blogModal");
            if (blogModal && event.target === blogModal) {
                blogModal.style.display = "none";
            }
        });
    </script>
</body>
</html>
