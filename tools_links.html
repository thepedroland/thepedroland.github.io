<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedro Oliveira (@thepedroland) | Tools & Links</title>
</head>

<body> <header id="nav-placeholder" class="navbar"></header>

    <section class="tools_links-section">
        <div class="container" style="max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem;">
            <h2 class="tools-title" style="color: black; font-size: 2rem;">Tools & Links</h2>
            <p class="tools-subtitle" style="color: #666; margin-bottom: 2rem;">Open-source numerical models and quantitative geomorphology resources.</p>

            <div class="tools-grid">
                <a href="https://github.com/thepedroland/sandtecbox" target="_blank" class="tool-card">
                    <div class="tool-icon">
                        <i class="fas fa-cubes"></i>
                    </div>
                    <div class="tool-content">
                        <small class="tag">Numerical Model</small>
                        <h3>Tectonic Sandbox</h3>
                        <p>Access the core repository for landscape evolution and tectonic simulation tools.</p>
                        <span class="tool-link">View on GitHub <i class="fab fa-github"></i></span>
                    </div>
                </a>
                </div>
        </div>
    </section>

    <div id="modal-placeholder"></div>

    <script>
        // 1. Component Loader Function
        async function loadComponent(id, url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.text();
                document.getElementById(id).innerHTML = data;
            } catch (err) {
                console.error("Error loading component:", url, err);
            }
        }

        // 2. Initialize Components on Load
        window.addEventListener('DOMContentLoaded', async () => {
            // Loading both Navbar and the separate Modal file
            await loadComponent('nav-placeholder', '/navbar.html');
            await loadComponent('modal-placeholder', '/contact-modal.html');
        });

        // 3. Global Event Delegation for Clicks
        document.addEventListener("click", function (e) {
            const modal = document.getElementById("contactModal");

            // Open Modal via the "Need help coding?" button
            if (e.target.closest("#navContact")) {
                e.preventDefault();
                if (modal) modal.style.display = "flex";
            }

            // Close Modal (via X button or background click)
            if (e.target.classList.contains("close-btn") || e.target === modal) {
                if (modal) modal.style.display = "none";
            }

            // Mobile Hamburger Menu Toggle
            if (e.target.closest(".menu-toggle")) {
                const navLinks = document.querySelector(".nav-links");
                if (navLinks) navLinks.classList.toggle("active");
            }
        });
    </script>

</body>
</html>
